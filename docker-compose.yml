name: inkcast

services:
  backend:
    image: frappe/erpnext:v15.81.1-india2
    networks: [frappe_network]
    restart: unless-stopped
    volumes:
      - inkcast-sites:/home/frappe/frappe-bench/sites
      - inkcast-logs:/home/frappe/frappe-bench/logs
      - ./inkcast_custom:/home/frappe/frappe-bench/apps/inkcast_custom
    environment:
      DB_HOST: db
      DB_PORT: "3306"
      MYSQL_ROOT_PASSWORD: admin
      MARIADB_ROOT_PASSWORD: admin

  configurator:
    image: frappe/erpnext:v15.81.1-india2
    networks: [frappe_network]
    restart: "no"
    entrypoint: [bash, -lc]
    command: >
      ls -1 apps | sort > sites/apps.txt;
      bench set-config -g db_host $$DB_HOST;
      bench set-config -gp db_port $$DB_PORT;
      bench set-config -g redis_cache "redis://$$REDIS_CACHE";
      bench set-config -g redis_queue "redis://$$REDIS_QUEUE";
      bench set-config -g redis_socketio "redis://$$REDIS_QUEUE";
      bench set-config -gp socketio_port $$SOCKETIO_PORT;
    environment:
      DB_HOST: db
      DB_PORT: "3306"
      REDIS_CACHE: redis-cache:6379
      REDIS_QUEUE: redis-queue:6379
      SOCKETIO_PORT: "9000"
    volumes:
      - inkcast-sites:/home/frappe/frappe-bench/sites
      - inkcast-logs:/home/frappe/frappe-bench/logs
      - ./inkcast_custom:/home/frappe/frappe-bench/apps/inkcast_custom

  create-site:
    image: frappe/erpnext:v15.81.1-india2
    networks: [frappe_network]
    restart: "no"
    depends_on: [db, redis-cache, redis-queue, configurator]
    volumes:
      - inkcast-sites:/home/frappe/frappe-bench/sites
      - inkcast-logs:/home/frappe/frappe-bench/logs
      - ./inkcast_custom:/home/frappe/frappe-bench/apps/inkcast_custom
    entrypoint: [bash, -lc]
    command: >
      wait-for-it -t 120 db:3306;
      wait-for-it -t 120 redis-cache:6379;
      wait-for-it -t 120 redis-queue:6379;
      export start=`date +%s`;
      until [[ -n `grep -hs ^ sites/common_site_config.json | jq -r ".db_host // empty"` ]] && \
            [[ -n `grep -hs ^ sites/common_site_config.json | jq -r ".redis_cache // empty"` ]] && \
            [[ -n `grep -hs ^ sites/common_site_config.json | jq -r ".redis_queue // empty"` ]];
      do
        echo "Waiting for sites/common_site_config.json to be created";
        sleep 5;
        if (( `date +%s`-start > 120 )); then
          echo "could not find sites/common_site_config.json with required keys";
          exit 1;
        fi;
      done;
      echo "sites/common_site_config.json found";
      bench new-site inkcast.shauqtechnology.in \
        --mariadb-user-host-login-scope='%' \
        --admin-password=admin \
        --db-root-username=root \
        --db-root-password=admin \
        --install-app erpnext \
        --set-default;

  db:
    image: mariadb:10.6
    networks: [frappe_network]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "--password=admin"]
      interval: 1s
      retries: 20
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --skip-character-set-client-handshake
      - --skip-innodb-read-only-compressed
    environment:
      MYSQL_ROOT_PASSWORD: admin
      MARIADB_ROOT_PASSWORD: admin
    volumes:
      - inkcast-db-data:/var/lib/mysql

  frontend:
    image: frappe/erpnext:v15.81.1-india2
    networks: [frappe_network]
    depends_on: [websocket]
    restart: unless-stopped
    command: [nginx-entrypoint.sh]
    environment:
      FRAPPE_DEFAULT_SITE: inkcast.shauqtechnology.in
      FRAPPE_SITE_NAME_HEADER: inkcast.shauqtechnology.in
      BACKEND: backend:8000
      SOCKETIO: websocket:9000
      UPSTREAM_REAL_IP_ADDRESS: 127.0.0.1
      UPSTREAM_REAL_IP_HEADER: X-Forwarded-For
      UPSTREAM_REAL_IP_RECURSIVE: "off"
      PROXY_READ_TIMEOUT: 120
      CLIENT_MAX_BODY_SIZE: 50m
    volumes:
      - inkcast-sites:/home/frappe/frappe-bench/sites
      - inkcast-logs:/home/frappe/frappe-bench/logs
      # keep this so /assets/inkcast_custom/* can be served
      - ./inkcast_custom:/home/frappe/frappe-bench/apps/inkcast_custom
    ports:
      - "8081:8080"

  queue-long:
    image: frappe/erpnext:v15.81.1-india2
    networks: [frappe_network]
    restart: unless-stopped
    command: [bench, worker, --queue, "long,default,short"]
    volumes:
      - inkcast-sites:/home/frappe/frappe-bench/sites
      - inkcast-logs:/home/frappe/frappe-bench/logs
      - ./inkcast_custom:/home/frappe/frappe-bench/apps/inkcast_custom

  queue-short:
    image: frappe/erpnext:v15.81.1-india2
    networks: [frappe_network]
    restart: unless-stopped
    command: [bench, worker, --queue, "short,default"]
    volumes:
      - inkcast-sites:/home/frappe/frappe-bench/sites
      - inkcast-logs:/home/frappe/frappe-bench/logs
      - ./inkcast_custom:/home/frappe/frappe-bench/apps/inkcast_custom

  scheduler:
    image: frappe/erpnext:v15.81.1-india2
    networks: [frappe_network]
    restart: unless-stopped
    command: [bench, schedule]
    volumes:
      - inkcast-sites:/home/frappe/frappe-bench/sites
      - inkcast-logs:/home/frappe/frappe-bench/logs
      - ./inkcast_custom:/home/frappe/frappe-bench/apps/inkcast_custom

  websocket:
    image: frappe/erpnext:v15.81.1-india2
    networks: [frappe_network]
    restart: unless-stopped
    command: [node, /home/frappe/frappe-bench/apps/frappe/socketio.js]
    volumes:
      - inkcast-sites:/home/frappe/frappe-bench/sites
      - inkcast-logs:/home/frappe/frappe-bench/logs
      - ./inkcast_custom:/home/frappe/frappe-bench/apps/inkcast_custom

  redis-queue:
    image: redis:6.2-alpine
    networks: [frappe_network]
    restart: unless-stopped
    volumes:
      - inkcast-redis-queue-data:/data

  redis-cache:
    image: redis:6.2-alpine
    networks: [frappe_network]
    restart: unless-stopped

volumes:
  inkcast-db-data:
    name: inkcast-db-data
  inkcast-redis-queue-data:
    name: inkcast-redis-queue-data
  inkcast-sites:
    name: inkcast-sites
  inkcast-logs:
    name: inkcast-logs

networks:
  frappe_network:
    driver: bridge

